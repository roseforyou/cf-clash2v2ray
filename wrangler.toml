name = "cf-clash2v2ray"
compatibility_date = "2026-07-10"
compatibility_flags = [ "nodejs_compat" ]

[pages_build_config]
directory = "dist"
build_command = "npm run build"

[vars]
# For local testing. In production, configure FETCH_PROXY_TOKEN in the Cloudflare Pages dashboard environment variables.
FETCH_PROXY_TOKEN = "local_development_token_change_me_in_dashboard"

[[kv_namespaces]]
binding = "KV"
id = "cf_clash2v2ray_kv"
